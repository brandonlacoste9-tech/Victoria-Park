# RendezVous AI — Netlify deploy config
# Docs: docs/NETLIFY_DEPLOY.md

[build]
  base = "web"
  command = "npm run build"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--legacy-peer-deps"
  # NEXT_PUBLIC_* values are inlined into the client bundle by design.
  # Omit duplicate/legacy Supabase env names Netlify may mark as secrets.
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL,SUPABASE_URL_STRING,NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY,SUPABASE_PUBLISHABLE_KEY,NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY"

# Next.js App Router API routes + SSR (scheduled wrappers in /netlify/functions)
[functions]
  node_bundler = "esbuild"

# Security headers (marketing site)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"